<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" role="img" aria-label="Refrigeración industrial — imagen de reemplazo">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12315a"/>
      <stop offset="0.5" stop-color="#0A2540"/>
      <stop offset="1" stop-color="#071A30"/>
    </linearGradient>
    <radialGradient id="hglow" cx="0.8" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hcold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fdbff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1200" fill="url(#hg)"/>
  <rect width="1920" height="1200" fill="url(#hglow)"/>
  <!-- Líneas técnicas sutiles -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 300 H1920 M0 600 H1920 M0 900 H1920 M480 0 V1200 M960 0 V1200 M1440 0 V1200"/>
  </g>
  <!-- Copo de nieve estilizado (marca de refrigeración) -->
  <g transform="translate(1330 600)" stroke="url(#hcold)" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.85">
    <g id="arm">
      <line x1="0" y1="0" x2="0" y2="-320"/>
      <line x1="0" y1="-150" x2="-55" y2="-205"/>
      <line x1="0" y1="-150" x2="55" y2="-205"/>
      <line x1="0" y1="-250" x2="-45" y2="-295"/>
      <line x1="0" y1="-250" x2="45" y2="-295"/>
    </g>
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="26" fill="url(#hcold)" stroke="none"/>
  </g>
  <text x="120" y="1120" font-family="'Space Grotesk',sans-serif" font-size="40" fill="#ffffff" fill-opacity="0.28" font-weight="600">Reemplazar por foto real · assets/images/hero.webp</text>
</svg>
