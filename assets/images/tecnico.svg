<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1000" viewBox="0 0 900 1000" role="img" aria-label="Técnico de refrigeración — imagen de reemplazo">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EFF4FF"/>
      <stop offset="1" stop-color="#DCE7FA"/>
    </linearGradient>
    <linearGradient id="tb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1000" fill="url(#tg)"/>
  <!-- Nevera / equipo -->
  <rect x="300" y="210" width="300" height="600" rx="26" fill="#ffffff" stroke="#C9D8F0" stroke-width="3"/>
  <line x1="300" y1="470" x2="600" y2="470" stroke="#C9D8F0" stroke-width="3"/>
  <rect x="345" y="270" width="16" height="120" rx="8" fill="#C9D8F0"/>
  <rect x="345" y="520" width="16" height="120" rx="8" fill="#C9D8F0"/>
  <!-- Figura técnica simplificada -->
  <g transform="translate(560 470)">
    <circle cx="0" cy="0" r="52" fill="url(#tb)"/>
    <rect x="-60" y="60" width="120" height="150" rx="40" fill="url(#tb)"/>
    <!-- llave inglesa -->
    <g transform="rotate(35)" stroke="#10B981" stroke-width="18" stroke-linecap="round">
      <line x1="-10" y1="120" x2="70" y2="40"/>
    </g>
  </g>
  <text x="450" y="920" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="26" fill="#5B6B7C" font-weight="600">Técnico certificado · reemplazar por foto real</text>
</svg>
